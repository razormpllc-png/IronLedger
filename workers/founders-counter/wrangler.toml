name = "ironledger-founders"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Bind a KV namespace before deploying:
#   wrangler kv namespace create FOUNDERS
# Then paste the resulting id below and re-deploy.
[[kv_namespaces]]
binding = "FOUNDERS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Total Founders slots. Plain var; update and redeploy to expand the pool.
[vars]
CAP = "1000"

# Secrets (set via `wrangler secret put`, not committed here):
#   REVENUECAT_SECRET  — shared secret RevenueCat sends on webhooks
#   ADMIN_TOKEN        — personal bearer for /admin endpoints
